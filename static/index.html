<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge — Real-time Sign Language Translator</title>
    <meta name="description" content="SignBridge translates sign language to text and speech in real-time using computer vision and machine learning.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <h1>SIGN<span style="color: var(--accent-white); background: var(--accent-black); padding: 0 10px; margin-left: 10px; border: 3px solid var(--accent-white);">BRIDGE</span></h1>
                <div class="status-pill" id="connection-status">
                    <span class="pulse-dot"></span>
                    <span>STANDALONE KIOSK MODE</span>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="mode-detect">Detect Sign</button>
                    <button class="mode-btn" id="mode-reverse">Text to Sign</button>
                </div>
                <button class="icon-btn" id="btn-debug-toggle" title="Toggle Debug Panel" aria-label="Toggle debug panel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            
            <!-- ── REVERSE TRANSLATION MODE (Hidden by default) ── -->
            <section class="reverse-section hidden" id="reverse-section">
                <div class="reverse-container">
                    <div class="reverse-header">
                        <h2>English to Sign Language</h2>
                        <p>Type or speak to play signs on the OLED display.</p>
                    </div>
                    
                    <div class="input-wrapper">
                        <textarea id="reverse-input" placeholder="Enter text here..."></textarea>
                        <button class="mic-btn" id="btn-mic" title="Use Microphone">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                    </div>
                    
                    <button class="play-signs-btn" id="btn-play-signs">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Play on OLED Screen
                    </button>
                </div>
            </section>

            <!-- ── SIGN DETECTION MODE ── -->
            <section class="camera-section" id="detect-section-left">
                <div class="camera-wrapper" id="camera-wrapper">
                    <img id="video-feed" src="/video_feed" alt="Camera Feed" draggable="false">
                    <div class="crt-overlay"></div>
                    <div class="camera-overlay">
                        <div class="hand-indicator" id="hand-indicator">
                            <span class="indicator-dot"></span>
                            <span class="indicator-text">No Hand</span>
                        </div>
                        <div class="fsm-badge" id="fsm-badge">IDLE</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="ctrl-btn ctrl-backspace" id="btn-backspace" title="Remove last letter">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                        <span>Backspace</span>
                    </button>
                    <button class="ctrl-btn ctrl-space" id="btn-space" title="Finalize word">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        <span>Next Word</span>
                    </button>
                    <button class="ctrl-btn ctrl-speak" id="btn-speak" title="Speak sentence">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
                        <span>Speak</span>
                    </button>
                    <button class="ctrl-btn ctrl-clear" id="btn-clear" title="Clear everything">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        <span>Clear</span>
                    </button>
                </div>
            </section>

            <!-- Right: Translation -->
            <section class="translation-section">
                <!-- Current Sign -->
                <div class="card card-sign" id="card-sign">
                    <div class="card-label">Current Sign</div>
                    <div class="sign-display">
                        <div class="sign-letter" id="sign-letter">—</div>
                        <div class="confidence-ring" id="confidence-ring">
                            <svg viewBox="0 0 100 100">
                                <circle class="ring-bg" cx="50" cy="50" r="44"/>
                                <circle class="ring-fill" id="ring-fill" cx="50" cy="50" r="44"/>
                            </svg>
                            <span class="ring-label" id="ring-label">0%</span>
                        </div>
                    </div>
                    <div class="cooldown-bar" id="cooldown-bar">
                        <div class="cooldown-fill" id="cooldown-fill"></div>
                    </div>
                </div>

                <!-- Word Builder -->
                <div class="card card-word">
                    <div class="card-label">Building Word</div>
                    <div class="word-suggestions" id="word-suggestions">
                        <!-- Suggestion pills injected here -->
                    </div>
                    <div class="letter-tiles" id="letter-tiles">
                        <span class="tile-placeholder">Show a sign to begin...</span>
                    </div>
                </div>

                <!-- Sentence -->
                <div class="card card-sentence">
                    <div class="card-label">Sentence</div>
                    <div class="sentence-text" id="sentence-text-container">
                        <span class="sentence-placeholder" id="sentence-placeholder">Words will appear here</span>
                        <span id="sentence-text"></span>
                        <span class="ghost-text" id="sentence-ghost"></span>
                    </div>
                    <button class="speak-sentence-btn" id="btn-speak-sentence" title="Speak full sentence">
                        🔊 Speak Sentence
                    </button>
                </div>

                <!-- Debug Panel (hidden by default) -->
                <div class="card card-debug hidden" id="debug-panel">
                    <div class="card-label">🔧 Debug</div>
                    <div class="debug-grid">
                        <div class="debug-row">
                            <span class="debug-key">Hand</span>
                            <span class="debug-val" id="d-hand">—</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-key">Raw Pred</span>
                            <span class="debug-val" id="d-raw">—</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-key">Confidence</span>
                            <span class="debug-val" id="d-conf">—</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-key">FSM State</span>
                            <span class="debug-val" id="d-fsm">—</span>
                        </div>
                        <div class="debug-row">
                            <span class="debug-key">Cooldown</span>
                            <span class="debug-val" id="d-cooldown">—</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
